{% extends "base.html" %}

{% block content %}
<h3>Редактировать видео: {{ video.title }}</h3>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{% url 'video_detail' video.id %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
