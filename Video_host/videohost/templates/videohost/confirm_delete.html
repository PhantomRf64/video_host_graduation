{% extends "base.html" %}

{% block content %}
<h3>Удалить видео: "{{ video.title }}"?</h3>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'video_detail' video.id %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
